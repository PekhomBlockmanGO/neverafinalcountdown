# /etc/nginx/sites-available/nevera
# Symlink to: /etc/nginx/sites-enabled/nevera

server {
    listen 80;
    server_name nevera.neverno.in www.nevera.neverno.in;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nevera.neverno.in www.nevera.neverno.in;

    # ── SSL (Certbot will auto-fill these paths) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/nevera.neverno.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nevera.neverno.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Upload size ───────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Static files served directly by Nginx ────────────────────────────
    location /static/ {
        alias /home/nevera/nevera_cmms/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files served directly by Nginx ─────────────────────────────
    location /media/ {
        alias /home/nevera/nevera_cmms/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── All other requests → Gunicorn via Unix socket ─────────────────────
    location / {
        proxy_pass          http://unix:/run/nevera/gunicorn.sock;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120;
        proxy_connect_timeout 10;
    }
}
