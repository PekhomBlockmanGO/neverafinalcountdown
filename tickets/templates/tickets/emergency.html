{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Emergency</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#1e2a5c; display:flex; align-items:center; justify-content:center; min-height:100vh;">

<div class="bg-white p-5 rounded-4 text-center" style="max-width:400px; width:100%;">

    <h3 class="fw-bold text-danger mb-3">
        🚨 Emergency SOS
    </h3>

    {% if contact %}
        <p class="text-muted mb-4">
            Tap below to call emergency support immediately.
        </p>

        <a href="tel:{{ contact.phone_number }}"
           class="btn btn-danger btn-lg w-100 fw-bold">
            📞 Call {{ contact.phone_number }}
        </a>
    {% else %}
        <p class="text-muted">No emergency contact configured.</p>
    {% endif %}

</div>

</body>
</html>
